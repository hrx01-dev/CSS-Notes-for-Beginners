<!-- To get started with CSS, you can create a simple HTML file and link it to a CSS file. Here's an example of how to do that: 
use the following code in your index.html file 
 To get a boiler plate HTML file, you can do ! and ctrl + enter in VS Code. This will give you a basic HTML structure to start with. Then, you can create a separate CSS file (e.g., styles.css) and link it to your HTML file using the link tag in the head section. Here's how you can do that: -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
    <style>
        h1 {
            color: red;/* This will set the color of all h1 elements to red */
        }
        p {
            color: blue;/* This will set the color of all p elements to blue */
        }
    </style>
</head>
<body>
    <h1>Hello , Developers </h1>
    <p>This is a simple paragraph.</p>
</body>
</html>
<!-- currently the above code shows a simple HTML structure with a heading and a default black color but if you want to change the color  of that text you can do by the following methods  -->
